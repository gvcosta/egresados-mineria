<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red de Egresados - Ing. en Minas UNSL</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
    /* Estilos conservados del original para mantener la estética */
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#1B2A4A;--navy2:#243460;--gold:#D4962A;--gold2:#F0B84A;
      --cream:#F8F4EE;--text:#1A1A2A;--muted:#6B7280;--border:#E5E0D8;
      --success:#1D9E75;--danger:#E24B4A;--teal:#1A6B8A;--radius:10px;
    }
    body{font-family:'Source Sans 3',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
    header{background:var(--navy);color:#fff;padding:2rem 1rem;text-align:center;border-bottom:4px solid var(--gold)}
    .container{max-width:1200px;margin:2rem auto;padding:0 1rem;flex:1;width:100%}
    .card{background:#fff;border-radius:var(--radius);padding:1.5rem;box-shadow:0 4px 15px rgba(0,0,0,0.05);margin-bottom:2rem;border:1px solid var(--border)}
    #map{height:500px;width:100%;border-radius:var(--radius);border:2px solid var(--navy2);z-index:1}
    .loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.9);display:flex;justify-content:center;align-items:center;z-index:9999}
    table{width:100%;border-collapse:collapse;margin-top:1rem}
    th,td{padding:12px;text-align:left;border-bottom:1px solid var(--border)}
    th{background:var(--navy);color:#white}
    .btn{padding:10px 20px;border-radius:5px;cursor:pointer;border:none;background:var(--gold);color:var(--navy);font-weight:bold}
    /* ... (resto de tus estilos originales) ... */
</style>
</head>
<body>

<div id="loader" class="loading-overlay">
    <div style="text-align:center">
        <p>Cargando base de datos de egresados...</p>
        <small>Conectando con Google Sheets</small>
    </div>
</div>

<header>
    <h1>Red Global de Egresados</h1>
    <p>Ingeniería en Minas - UNSL</p>
</header>

<div class="container">
    <div class="card">
        <h2>Mapa de Ubicación Actual</h2>
        <div id="map"></div>
    </div>

    <div class="card">
        <h2>Listado de Egresados</h2>
        <div style="overflow-x:auto">
            <table id="gradsTable">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Año</th>
                        <th>Ubicación</th>
                        <th>Empresa</th>
                    </tr>
                </thead>
                <tbody id="gradsBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbybYBJKNs2dqcaSndA3Z3h5vuk2fF0RKSHTIlTqEsAbp-b8QgJAO70DujHDfZ1GmaSagA/exec';
let map;
let markers = [];

async function init() {
    try {
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        window.grads = data;
        
        document.getElementById('loader').style.display = 'none';
        renderMap();
        renderTable();
    } catch (error) {
        console.error("Error cargando datos:", error);
        alert("No se pudo cargar la base de datos compartida.");
    }
}

function renderMap() {
    if (!map) {
        map = L.map('map').setView([-33.30, -66.33], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    }

    window.grads.forEach(g => {
        if (g.lat && g.lng) {
            const marker = L.marker([g.lat, g.lng]).addTo(map);
            marker.bindPopup(`<b>${g.nombre} ${g.apellido}</b><br>${g.cargo} en ${g.empresa}<br>${g.ciudad}, ${g.pais}`);
            markers.push(marker);
        }
    });
}

function renderTable() {
    const body = document.getElementById('gradsBody');
    body.innerHTML = window.grads.map(g => `
        <tr>
            <td>${g.nombre} ${g.apellido}</td>
            <td>${g.anio_egreso || '-'}</td>
            <td>${g.ciudad}, ${g.pais}</td>
            <td>${g.empresa || 'N/A'}</td>
        </tr>
    `).join('');
}

window.onload = init;
</script>
</body>
</html>
